# Deploy Paperclip to Render (free *.onrender.com domain)
# Connect this repo in Render Dashboard → New Blueprint
# Or deploy the official repo: https://github.com/paperclipai/paperclip

services:
  - type: web
    name: ola-paperclip
    runtime: docker
    repo: https://github.com/paperclipai/paperclip
    branch: master
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3100
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: PAPERCLIP_AUTH_PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ola-paperclip-db
          property: connectionString

databases:
  - name: ola-paperclip-db
    plan: free
    databaseName: paperclip
    user: paperclip
